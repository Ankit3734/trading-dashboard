<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KUAD ELITE | PROGRESS PRO</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050811; --card: #111827; --text: #e2e8f0; --win: #10b981; --loss: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: #0a0f1a; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; color: #64748b; font-weight: 600; font-size: 0.85rem; }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: var(--accent); }
        .main { flex: 1; padding: 25px; overflow-y: auto; background: radial-gradient(circle at top right, #0f172a, #050811); }
        .section { display: none; max-width: 900px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--card); border: 1px solid #1f2937; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 12px; }
        
        /* Stats & Progress */
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #030712; padding: 12px; border-radius: 10px; border: 1px solid #1f2937; text-align: center; }
        .stat-label { font-size: 0.55rem; color: #64748b; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .stat-val { font-size: 0.95rem; font-weight: 800; color: #fff; }
        
        .progress-container { background: #030712; height: 12px; border-radius: 6px; border: 1px solid #1e293b; position: relative; overflow: hidden; margin-bottom: 10px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981); width: 0%; transition: 1s ease-in-out; }
        .progress-text { font-size: 0.7rem; color: var(--accent); text-align: right; font-weight: bold; }

        input, select { width: 100%; background: #030712; border: 1px solid #374151; color: #fff; padding: 12px; border-radius: 8px; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        button.primary { background: linear-gradient(135deg, #00d2ff, #3b82f6); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
        .log-item { background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="border:none; text-align:center; padding:0; margin-bottom:30px; font-size:1.2rem; color:white;">KUAD ELITE</h2>
        <div class="nav-item active" onclick="showSec('dash')">DASHBOARD</div>
        <div class="nav-item" onclick="showSec('calc')">LOT CALCULATOR</div>
        <div class="nav-item" onclick="showSec('journal')">TRADE JOURNAL</div>
        <div class="nav-item" onclick="showSec('daily')">DAILY LOG</div>
        <div class="nav-item" onclick="showSec('accounts')">ACCOUNTS</div>
    </div>

    <div class="main">
        <div id="dash" class="section active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2>Target Tracker</h2>
                    <select id="acc-select" onchange="switchAcc()" style="width:auto; border:none; background:transparent; color:var(--accent); font-weight:bold;"></select>
                </div>
                
                <div class="grid-4">
                    <div class="stat-box"><span class="stat-label">Starting</span><div id="d-st" class="stat-val">$0</div></div>
                    <div class="stat-box"><span class="stat-label">Current</span><div id="d-cur" class="stat-val">$0</div></div>
                    <div class="stat-box"><span class="stat-label">Target</span><div id="d-trg" class="stat-val">$0</div></div>
                    <div class="stat-box"><span class="stat-label">To Goal</span><div id="d-rem" class="stat-val" style="color:var(--win)">$0</div></div>
                </div>

                <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
                <div id="p-text" class="progress-text">0% Completed</div>
            </div>
        </div>

        <div id="calc" class="section">
            <div class="card">
                <h2>Precision Calculator</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="number" id="c-bal" placeholder="Manual Balance ($)">
                    <input type="number" id="c-risk" value="1">
                </div>
                <input type="number" id="c-sl" placeholder="Stop Loss (Pips)">
                <div style="font-size:3.5rem; font-weight:900; text-align:center; color:var(--accent); margin:15px 0;" id="lot-res">0.00</div>
                <button class="primary" onclick="runCalc()">Calculate & Copy</button>
            </div>
        </div>

        <div id="journal" class="section">
            <div class="card">
                <h2>Trade Journal</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <select id="j-pair"><option>XAUUSD</option><option>EURUSD</option><option>GBPUSD</option><option>BTCUSD</option></select>
                    <select id="j-session"><option>London</option><option>New York</option><option>Asia</option></select>
                </div>
                <input type="number" id="j-pnl" placeholder="P/L ($)">
                <button class="primary" onclick="logTrade('journal')">Save Trade</button>
            </div>
            <div id="journal-history"></div>
        </div>

        <div id="daily" class="section">
            <div class="card">
                <h2>Daily Log</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <select id="d-day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select>
                    <input type="number" id="d-pnl" placeholder="Daily Net P/L ($)">
                </div>
                <button class="primary" onclick="logTrade('daily')">Save Day</button>
            </div>
            <div id="daily-history"></div>
        </div>

        <div id="accounts" class="section">
            <div class="card">
                <h2 id="form-title">Accounts Management</h2>
                <input type="hidden" id="edit-idx" value="-1">
                <input type="text" id="a-name" placeholder="Account Name">
                <div class="grid-4" style="grid-template-columns: 1fr 1fr 1fr;">
                    <input type="number" id="a-st" placeholder="Start">
                    <input type="number" id="a-cur" placeholder="Current">
                    <input type="number" id="a-trg" placeholder="Target">
                </div>
                <button class="primary" id="save-btn" onclick="handleAcc()">Save Account</button>
            </div>
            <div id="acc-list"></div>
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('kuad_v17')) || { accs: [], active: -1, logs: [], daily: [] };

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
        updateUI();
    }

    function handleAcc() {
        const n = document.getElementById('a-name').value, st = parseFloat(document.getElementById('a-st').value), 
              cur = parseFloat(document.getElementById('a-cur').value), trg = parseFloat(document.getElementById('a-trg').value),
              idx = parseInt(document.getElementById('edit-idx').value);
        if(!n) return;
        const obj = {name: n, start: st, current: cur, target: trg};
        if(idx === -1) { db.accs.push(obj); if(db.active === -1) db.active = 0; }
        else { db.accs[idx] = obj; document.getElementById('edit-idx').value = "-1"; }
        save(); location.reload();
    }

    function logTrade(type) {
        if(db.active === -1) return;
        const pnl = parseFloat(document.getElementById(type === 'journal' ? 'j-pnl' : 'd-pnl').value);
        if(isNaN(pnl)) return;
        db.accs[db.active].current += pnl;
        const entry = { acc: db.accs[db.active].name, pnl, date: new Date().toLocaleDateString() };
        if(type === 'journal') { entry.pair = document.getElementById('j-pair').value; entry.session = document.getElementById('j-session').value; db.logs.unshift(entry); }
        else { entry.day = document.getElementById('d-day').value; db.daily.unshift(entry); }
        save(); updateUI();
    }

    function switchAcc() { db.active = document.getElementById('acc-select').selectedIndex; save(); updateUI(); }
    function save() { localStorage.setItem('kuad_v17', JSON.stringify(db)); }

    function updateUI() {
        const sel = document.getElementById('acc-select');
        sel.innerHTML = db.accs.map(a => `<option>${a.name}</option>`).join('');
        sel.selectedIndex = db.active;

        if(db.active !== -1) {
            const a = db.accs[db.active];
            document.getElementById('d-st').innerText = `$${a.start}`;
            document.getElementById('d-cur').innerText = `$${a.current}`;
            document.getElementById('d-trg').innerText = `$${a.target}`;
            const diff = a.target - a.current;
            document.getElementById('d-rem').innerText = diff <= 0 ? "ACHIEVED 🚀" : `$${diff}`;

            // PROGRESS LOGIC
            const totalNeeded = a.target - a.start;
            const currentGain = a.current - a.start;
            let progress = (currentGain / totalNeeded) * 100;
            if(progress < 0) progress = 0;
            if(progress > 100) progress = 100;
            
            document.getElementById('p-bar').style.width = progress + '%';
            document.getElementById('p-text').innerText = Math.round(progress) + '% Completed';

            // Filter history by current account
            const filterHistory = (list, elementId, isDaily) => {
                document.getElementById(elementId).innerHTML = list.filter(l => l.acc === a.name).map(l => `
                    <div class="log-item">
                        <span><b>${isDaily ? l.day : l.pair}</b> (${l.date})</span>
                        <span style="color:${l.pnl >=0 ? 'var(--win)' : 'var(--loss)'}">${l.pnl >=0 ? '+' : ''}${l.pnl}$</span>
                    </div>`).join('');
            };
            filterHistory(db.logs, 'journal-history', false);
            filterHistory(db.daily, 'daily-history', true);
        }

        document.getElementById('acc-list').innerHTML = db.accs.map((a, i) => `
            <div class="acc-row" style="background:#0d1117; padding:10px; border-radius:8px; margin-bottom:5px; border:1px solid #1e293b; display:flex; justify-content:space-between;">
                <span>${a.name}</span>
                <div>
                    <button onclick="editAcc(${i})" class="badge" style="background:var(--accent); color:#000;">EDIT</button>
                    <button onclick="delAcc(${i})" class="badge" style="background:var(--loss); color:#fff; margin-left:5px;">DEL</button>
                </div>
            </div>`).join('');
    }

    function editAcc(i) {
        const a = db.accs[i];
        document.getElementById('a-name').value = a.name; document.getElementById('a-st').value = a.start;
        document.getElementById('a-cur').value = a.current; document.getElementById('a-trg').value = a.target;
        document.getElementById('edit-idx').value = i; document.getElementById('form-title').innerText = "Edit " + a.name;
        showSec('accounts');
    }

    function runCalc() {
        const bal = parseFloat(document.getElementById('c-bal').value) || (db.active !== -1 ? db.accs[db.active].current : 0);
        const sl = parseFloat(document.getElementById('c-sl').value), risk = parseFloat(document.getElementById('c-risk').value);
        if(bal && sl) {
            const lot = (bal * (risk/100)) / (sl * 10);
            document.getElementById('lot-res').innerText = lot.toFixed(2);
            navigator.clipboard.writeText(lot.toFixed(2));
            alert("Lot Size Copied!");
        }
    }

    function delAcc(i) { if(confirm("Delete?")) { db.accs.splice(i,1); db.active = 0; save(); location.reload(); } }
    updateUI();
</script>
</body>
</html>
