<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUAD ELITE | TRADER PLATFORM</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050811; --card: #111827; --text: #e2e8f0; --win: #10b981; --loss: #ef4444; --border: #1f2937; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .auth-tabs { display: flex; margin-bottom: 25px; background: #030712; border-radius: 12px; padding: 5px; }
        .auth-tab { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 0.8rem; font-weight: 700; color: #64748b; }
        .auth-tab.active { background: #1e293b; color: var(--accent); }

        /* MAIN APP */
        #app-content { display: none; flex-direction: column; min-height: 100vh; }
        
        .sidebar { width: 100%; background: #0a0f1a; border-bottom: 1px solid var(--border); padding: 10px; display: flex; overflow-x: auto; position: sticky; top: 0; z-index: 100; gap: 8px; }
        .nav-item { padding: 10px 18px; cursor: pointer; border-radius: 8px; color: #64748b; font-weight: 700; font-size: 0.75rem; white-space: nowrap; border: 1px solid transparent; }
        .nav-item.active { background: #1e293b; color: var(--accent); border-color: var(--accent); }

        .main { flex: 1; padding: 15px; }
        .section { display: none; width: 100%; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 15px; }
        h2 { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        h2::before { content: ''; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }

        input, select { width: 100%; background: #030712; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; outline: none; margin-bottom: 12px; font-size: 0.9rem; }
        button.primary { background: linear-gradient(135deg, #00d2ff, #3b82f6); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 0.85rem; box-shadow: 0 4px 15px rgba(0,210,255,0.3); }

        .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #030712; padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 0.55rem; color: #64748b; display: block; margin-bottom: 4px; }
        .stat-val { font-size: 1.1rem; font-weight: 800; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .data-table td { padding: 12px 8px; border-bottom: 1px solid #0f172a; }

        @media (min-width: 768px) {
            body { flex-direction: row; }
            .sidebar { width: 220px; height: 100vh; flex-direction: column; border-bottom: none; border-right: 1px solid var(--border); }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="text-align:center; font-size:1.5rem; margin-bottom:20px;">KUAD <span style="color:var(--accent)">ELITE</span></h1>
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="toggleAuth('login')">LOGIN</div>
                <div class="auth-tab" id="tab-signup" onclick="toggleAuth('signup')">SIGNUP</div>
            </div>
            
            <div id="auth-form">
                <input type="text" id="auth-user" placeholder="Username">
                <input type="password" id="auth-pass" placeholder="Password">
                <button class="primary" id="auth-btn" onclick="processAuth()">Login to Terminal</button>
                <p id="auth-msg" style="color:var(--loss); font-size: 0.7rem; margin-top: 15px; text-align: center; display: none;"></p>
            </div>
        </div>
    </div>

    <div id="app-content">
        <div class="sidebar">
            <div style="padding: 15px; color: white; font-weight: 900; text-align: center;" id="user-display">TRADER</div>
            <div class="nav-item active" onclick="showSec('dash')">DASHBOARD</div>
            <div class="nav-item" onclick="showSec('journal')">JOURNAL</div>
            <div class="nav-item" onclick="showSec('logs')">LOGS</div>
            <div class="nav-item" onclick="showSec('calc')">LOT CALC</div>
            <div class="nav-item" onclick="showSec('accounts')">ACCOUNTS</div>
            <button onclick="logout()" style="background:transparent; border:none; color:var(--loss); font-size:0.75rem; font-weight:bold; cursor:pointer; margin-top:auto; padding:20px;">LOGOUT</button>
        </div>

        <div class="main">
            <div id="dash" class="section active">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h2>Active Monitor</h2>
                        <select id="acc-select" onchange="switchAcc()" style="width:auto; padding:5px 10px; margin:0; font-size:0.7rem;"></select>
                    </div>
                    <div class="grid-stats">
                        <div class="stat-box"><span class="stat-label">Bal</span><div id="d-cur" class="stat-val">$0</div></div>
                        <div class="stat-box"><span class="stat-label">Win%</span><div id="d-wr" class="stat-val" style="color:var(--accent)">0%</div></div>
                        <div class="stat-box"><span class="stat-label">Target</span><div id="d-rem" class="stat-val" style="color:var(--win)">$0</div></div>
                        <div class="stat-box"><span class="stat-label">Progress</span><div id="p-text" class="stat-val">0%</div></div>
                    </div>
                    <div style="background:#030712; height:8px; border-radius:4px; overflow:hidden;"><div id="p-bar" style="height:100%; background:linear-gradient(90deg, #3b82f6, #00d2ff); width:0%; transition:1s;"></div></div>
                </div>
                <div class="card"><h2>Day Stats (%)</h2><table class="data-table"><tbody id="day-stats-body"></tbody></table></div>
                <div class="card"><h2>Session + Pair</h2><div style="overflow-x:auto;"><table class="data-table"><tbody id="combo-stats-body"></tbody></table></div></div>
            </div>

            <div id="journal" class="section">
                <div class="card">
                    <h2>Trade Entry</h2>
                    <select id="j-day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select>
                    <select id="j-pair"><option>XAUUSD</option><option>EURUSD</option><option>GBPUSD</option><option>BTCUSD</option></select>
                    <select id="j-session"><option>London</option><option>New York</option><option>Asia</option></select>
                    <select id="j-basis"><option>Session Entry</option><option>IDM Sweep</option><option>Order Block</option><option>Breakout</option></select>
                    <select id="j-res" style="color:var(--win); font-weight:800;"><option value="win">PROFIT (+)</option><option value="loss">LOSS (-)</option></select>
                    <input type="number" id="j-pnl" placeholder="Amount ($)" inputmode="decimal">
                    <button class="primary" onclick="logTrade()">Save Trade</button>
                </div>
            </div>

            <div id="logs" class="section">
                <div class="card"><h2>History</h2><div id="full-history"></div></div>
            </div>

            <div id="calc" class="section">
                <div class="card">
                    <h2>Lot Calc</h2>
                    <input type="number" id="c-bal" placeholder="Balance ($)" inputmode="decimal">
                    <input type="number" id="c-risk" placeholder="Risk %" inputmode="decimal">
                    <input type="number" id="c-sl" placeholder="Stop Loss Pips" inputmode="decimal">
                    <div style="text-align:center; padding:20px 0; background:#030712; border-radius:12px; margin:10px 0;">
                        <span style="font-size:0.6rem; color:#64748b;">RECOMMENDED LOT</span>
                        <div id="lot-res" style="font-size:2.2rem; font-weight:900; color:var(--accent);">0.00</div>
                    </div>
                    <button class="primary" onclick="runCalc()">Calculate</button>
                </div>
            </div>

            <div id="accounts" class="section">
                <div class="card">
                    <h2>Accounts</h2>
                    <input type="text" id="a-name" placeholder="Acc Name">
                    <input type="number" id="a-st" placeholder="Start" inputmode="decimal">
                    <input type="number" id="a-cur" placeholder="Current" inputmode="decimal">
                    <input type="number" id="a-trg" placeholder="Target" inputmode="decimal">
                    <button class="primary" onclick="handleAcc()">Create</button>
                </div>
                <div id="acc-list"></div>
            </div>
        </div>
    </div>

<script>
    let mode = 'login';
    let currentUser = null;
    const USERS_KEY = 'KUAD_PLATFORM_USERS';

    function toggleAuth(m) {
        mode = m;
        document.getElementById('tab-login').classList.toggle('active', m==='login');
        document.getElementById('tab-signup').classList.toggle('active', m==='signup');
        document.getElementById('auth-btn').innerText = m === 'login' ? 'Login to Terminal' : 'Create Trader Account';
    }

    function processAuth() {
        const u = document.getElementById('auth-user').value.toLowerCase();
        const p = document.getElementById('auth-pass').value;
        const msg = document.getElementById('auth-msg');
        let users = JSON.parse(localStorage.getItem(USERS_KEY)) || {};

        if(!u || !p) return;

        if(mode === 'signup') {
            if(users[u]) { msg.innerText = "User already exists!"; msg.style.display='block'; return; }
            users[u] = { pass: p, data: { accs: [], active: -1, logs: [] } };
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            alert("Signup Success! Please Login.");
            toggleAuth('login');
        } else {
            if(users[u] && users[u].pass === p) {
                currentUser = u;
                sessionStorage.setItem('current_trader', u);
                initApp();
            } else {
                msg.innerText = "Invalid credentials!"; msg.style.display='block';
            }
        }
    }

    function initApp() {
        const savedUser = sessionStorage.getItem('current_trader');
        if(savedUser) {
            currentUser = savedUser;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('user-display').innerText = currentUser.toUpperCase();
            updateUI();
        }
    }

    function logout() { sessionStorage.removeItem('current_trader'); location.reload(); }

    window.onload = initApp;

    // DATA LOGIC (Scoped to User)
    function getUserData() {
        let users = JSON.parse(localStorage.getItem(USERS_KEY));
        return users[currentUser].data;
    }

    function saveUserData(data) {
        let users = JSON.parse(localStorage.getItem(USERS_KEY));
        users[currentUser].data = data;
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
        updateUI();
    }

    function logTrade() {
        let db = getUserData();
        if(db.active === -1) return;
        let pnl = parseFloat(document.getElementById('j-pnl').value);
        if(isNaN(pnl)) return;
        pnl = (document.getElementById('j-res').value === 'loss') ? -Math.abs(pnl) : Math.abs(pnl);
        db.accs[db.active].current += pnl;
        db.logs.unshift({ acc: db.accs[db.active].name, pnl, basis: document.getElementById('j-basis').value, pair: document.getElementById('j-pair').value, session: document.getElementById('j-session').value, day: document.getElementById('j-day').value, date: new Date().toLocaleDateString() });
        saveUserData(db); updateUI();
        document.getElementById('j-pnl').value = '';
    }

    function updateUI() {
        if(!currentUser) return;
        let db = getUserData();
        const sel = document.getElementById('acc-select');
        sel.innerHTML = db.accs.map(a => `<option>${a.name}</option>`).join('');
        sel.selectedIndex = db.active;

        if(db.active !== -1) {
            const a = db.accs[db.active];
            const accLogs = db.logs.filter(l => l.acc === a.name);
            document.getElementById('d-cur').innerText = `$${a.current.toFixed(0)}`;
            const rem = a.target - a.current;
            document.getElementById('d-rem').innerText = rem <= 0 ? "DONE" : `$${rem.toFixed(0)}`;
            const wins = accLogs.filter(l => l.pnl > 0).length;
            document.getElementById('d-wr').innerText = accLogs.length > 0 ? Math.round((wins/accLogs.length)*100)+'%' : '0%';
            let prog = Math.max(0, Math.min(100, ((a.current - a.start)/(a.target - a.start))*100));
            document.getElementById('p-bar').style.width = prog+'%';
            document.getElementById('p-text').innerText = Math.round(prog)+'%';

            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            document.getElementById('day-stats-body').innerHTML = days.map(d => {
                const logs = accLogs.filter(l => l.day === d);
                const wr = logs.length > 0 ? Math.round((logs.filter(l => l.pnl > 0).length/logs.length)*100) : 0;
                const pnl = logs.reduce((s, l) => s + l.pnl, 0);
                return `<tr><td>${d}</td><td style="color:var(--accent)">${wr}%</td><td style="color:${pnl>=0?'var(--win)':'var(--loss)'}">${pnl.toFixed(0)}$</td></tr>`;
            }).join('');

            const combos = {};
            accLogs.forEach(l => {
                const k = `${l.session} + ${l.pair}`;
                if(!combos[k]) combos[k] = {t:0, w:0, pnl:0};
                combos[k].t++; if(l.pnl > 0) combos[k].w++; combos[k].pnl += l.pnl;
            });
            document.getElementById('combo-stats-body').innerHTML = Object.keys(combos).map(k => `<tr><td><b>${k}</b></td><td>${Math.round((combos[k].w/combos[k].t)*100)}%</td><td style="color:${combos[k].pnl>=0?'var(--win)':'var(--loss)'}">${combos[k].pnl.toFixed(0)}$</td></tr>`).join('');
            document.getElementById('full-history').innerHTML = accLogs.map(l => `<div class="log-item"><div style="display:flex; justify-content:space-between;"><span><b>${l.pair}</b> | ${l.day}</span><b style="color:${l.pnl>=0?'var(--win)':'var(--loss)'}">${l.pnl>=0?'+':''}${l.pnl}$</b></div><div style="font-size:0.65rem; color:#64748b; margin-top:5px;">${l.session} - ${l.basis}</div></div>`).join('');
        }
        document.getElementById('acc-list').innerHTML = db.accs.map((a, i) => `<div class="log-row" style="display:flex; justify-content:space-between; background:#0d1117; padding:10px; border-radius:10px; margin-bottom:5px;"><span>${a.name}</span></div>`).join('');
    }

    function runCalc() {
        const b = parseFloat(document.getElementById('c-bal').value);
        const s = parseFloat(document.getElementById('c-sl').value), r = parseFloat(document.getElementById('c-risk').value);
        if(b && s && r) { document.getElementById('lot-res').innerText = ((b * (r/100)) / (s * 10)).toFixed(2); }
    }
    function switchAcc() { let db = getUserData(); db.active = document.getElementById('acc-select').selectedIndex; saveUserData(db); updateUI(); }
    function handleAcc() {
        let db = getUserData();
        const n = document.getElementById('a-name').value, st = parseFloat(document.getElementById('a-st').value), cur = parseFloat(document.getElementById('a-cur').value), trg = parseFloat(document.getElementById('a-trg').value);
        if(!n) return;
        db.accs.push({name:n, start:st, current:cur, target:trg});
        if(db.active === -1) db.active = 0;
        saveUserData(db); location.reload();
    }
</script>
</body>
</html>
