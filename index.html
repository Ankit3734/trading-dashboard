<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KUAD ELITE | PROGRESS TERMINAL</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050811; --card: #111827; --text: #e2e8f0; --win: #10b981; --loss: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: #0a0f1a; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; color: #64748b; font-weight: 600; font-size: 0.85rem; }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: var(--accent); }
        .main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #0f172a, #050811); }
        .section { display: none; max-width: 850px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border: 1px solid #1f2937; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 0.9rem; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 12px; }
        
        /* Stats Grid */
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #030712; padding: 15px; border-radius: 10px; border: 1px solid #1f2937; text-align: center; }
        .stat-label { font-size: 0.65rem; color: #64748b; display: block; margin-bottom: 5px; }
        .stat-val { font-size: 1.1rem; font-weight: 800; color: #fff; }

        /* Progress Bar */
        .progress-container { background: #030712; height: 10px; border-radius: 5px; margin: 20px 0; overflow: hidden; border: 1px solid #1e293b; }
        .progress-bar { background: linear-gradient(90deg, var(--accent), var(--win)); height: 100%; width: 0%; transition: 1s ease-in-out; }

        input, select { width: 100%; background: #030712; border: 1px solid #374151; color: #fff; padding: 12px; border-radius: 8px; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        button.primary { background: linear-gradient(135deg, #00d2ff, #3b82f6); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .acc-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #1e293b; }
        .del-btn { color: var(--loss); cursor: pointer; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="border:none; text-align:center; padding:0; margin-bottom:30px;">KUAD ELITE</h2>
        <div class="nav-item active" onclick="showSec('dash')">DASHBOARD</div>
        <div class="nav-item" onclick="showSec('accounts')">ACCOUNTS</div>
        <div class="nav-item" onclick="showSec('journal')">JOURNAL</div>
        <div class="nav-item" onclick="showSec('history')">HISTORY</div>
    </div>
    <div class="main">
        <div id="dash" class="section active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2>Terminal Stats</h2>
                    <select id="acc-select" onchange="switchAcc()" style="width:auto; margin:0; border:none; background:transparent; font-weight:bold; color:var(--accent);"></select>
                </div>
                <div class="grid-4">
                    <div class="stat-box"><span class="stat-label">START</span><div id="st-bal" class="stat-val">$0</div></div>
                    <div class="stat-box"><span class="stat-label">CURRENT</span><div id="cur-bal" class="stat-val">$0</div></div>
                    <div class="stat-box"><span class="stat-label">TARGET</span><div id="trg-bal" class="stat-val" style="color:var(--accent)">$0</div></div>
                    <div class="stat-box"><span class="stat-label">REMAINING</span><div id="rem-bal" class="stat-val" style="color:var(--win)">$0</div></div>
                </div>
                <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
                <div style="text-align:right; font-size:0.7rem; color:#64748b;">PROGRESS: <span id="p-text" style="color:var(--win)">0%</span></div>
            </div>
            <div class="card">
                <h2>Quick Calculator</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <input type="number" id="sl" placeholder="SL Pips">
                    <input type="number" id="risk" value="1">
                </div>
                <div style="text-align:center; font-size:3rem; font-weight:900; margin:10px 0;">
                    <span id="lot-res">0.00</span>
                    <span style="font-size:0.7rem; color:var(--accent); cursor:pointer; border:1px solid; padding:2px 8px; border-radius:10px;" onclick="copyLot()">COPY</span>
                </div>
                <button class="primary" onclick="calc()">CALCULATE</button>
            </div>
        </div>

        <div id="accounts" class="section">
            <div class="card">
                <h2>Account Management</h2>
                <input type="text" id="a-name" placeholder="Account Name (e.g. 50K Prop)">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <input type="number" id="a-st" placeholder="Start Bal">
                    <input type="number" id="a-cur" placeholder="Current Bal">
                    <input type="number" id="a-trg" placeholder="Target Bal">
                </div>
                <button class="primary" onclick="newAcc()">INITIALIZE ACCOUNT</button>
            </div>
            <div id="acc-list-manage"></div>
        </div>

        <div id="journal" class="section">
            <div class="card">
                <h2>Entry Protocol</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <select id="p-pair"><option>XAUUSD</option><option>EURUSD</option><option>GBPUSD</option><option>BTCUSD</option></select>
                    <select id="p-session"><option>London</option><option>New York</option><option>Asia</option></select>
                </div>
                <input type="number" id="p-pnl" placeholder="Profit/Loss Amount ($)">
                <button class="primary" onclick="logTrade()">COMMIT TRADE</button>
            </div>
        </div>

        <div id="history" class="section"><div id="hist-list"></div></div>
    </div>
<script>
    let db = JSON.parse(localStorage.getItem('kuad_v12')) || { accs: [], active: -1, logs: [] };
    function showSec(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); event.currentTarget.classList.add('active'); }
    
    function newAcc() {
        const n = document.getElementById('a-name').value, st = parseFloat(document.getElementById('a-st').value), cur = parseFloat(document.getElementById('a-cur').value), trg = parseFloat(document.getElementById('a-trg').value);
        if(n && !isNaN(st) && !isNaN(cur)) {
            db.accs.push({name: n, start: st, current: cur, target: trg});
            if(db.active === -1) db.active = 0;
            save(); location.reload();
        }
    }

    function switchAcc() { db.active = document.getElementById('acc-select').selectedIndex; save(); update(); }
    
    function logTrade() {
        const val = parseFloat(document.getElementById('p-pnl').value); if(db.active === -1 || isNaN(val)) return;
        db.accs[db.active].current += val;
        db.logs.unshift({acc: db.accs[db.active].name, pair: document.getElementById('p-pair').value, pnl: val, date: new Date().toLocaleDateString()});
        save(); update(); alert("Log Synchronized!");
    }

    function update() {
        const sel = document.getElementById('acc-select'); sel.innerHTML = db.accs.map(a => `<option>${a.name}</option>`).join(''); sel.selectedIndex = db.active;
        if(db.active !== -1) {
            const a = db.accs[db.active];
            document.getElementById('st-bal').innerText = `$${a.start.toLocaleString()}`;
            document.getElementById('cur-bal').innerText = `$${a.current.toLocaleString()}`;
            document.getElementById('trg-bal').innerText = `$${a.target.toLocaleString()}`;
            const rem = a.target - a.current;
            document.getElementById('rem-bal').innerText = `$${rem.toLocaleString()}`;
            
            // Progress Logic
            const totalToGet = a.target - a.start;
            const currentGained = a.current - a.start;
            let percent = (currentGained / totalToGet) * 100;
            if(percent < 0) percent = 0; if(percent > 100) percent = 100;
            document.getElementById('p-bar').style.width = percent + '%';
            document.getElementById('p-text').innerText = Math.round(percent) + '%';
        }
        document.getElementById('acc-list-manage').innerHTML = db.accs.map((a, i) => `<div class="acc-item"><span>${a.name}</span><span class="del-btn" onclick="delAcc(${i})">DELETE</span></div>`).join('');
        document.getElementById('hist-list').innerHTML = db.logs.filter(l => l.acc === db.accs[db.active]?.name).map(l => `<div style="background:#0f172a; padding:12px; border-radius:8px; margin-bottom:8px; border-left:4px solid ${l.pnl >=0 ? '#10b981' : '#ef4444'};"><b>${l.pair}</b> | ${l.pnl >= 0 ? '+' : ''}${l.pnl}$ <small>(${l.date})</small></div>`).join('');
    }

    function calc() {
        const acc = db.accs[db.active]; const s = document.getElementById('sl').value, r = document.getElementById('risk').value;
        if(acc && s) { const lot = (acc.current * (r/100)) / (s * 10); document.getElementById('lot-res').innerText = lot.toFixed(2); }
    }
    function copyLot() { navigator.clipboard.writeText(document.getElementById('lot-res').innerText); alert("Copied!"); }
    function delAcc(i) { if(confirm("Delete?")) { db.accs.splice(i,1); db.active = 0; save(); location.reload(); } }
    function save() { localStorage.setItem('kuad_v12', JSON.stringify(db)); }
    update();
</script>
</body>
</html>
