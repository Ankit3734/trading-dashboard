<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KUAD ELITE | MASTER TERMINAL</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050811; --card: #111827; --text: #e2e8f0; --win: #10b981; --loss: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: #0a0f1a; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; color: #64748b; font-weight: 600; font-size: 0.85rem; }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: var(--accent); }
        
        /* Main area */
        .main { flex: 1; padding: 25px; overflow-y: auto; background: radial-gradient(circle at top right, #0f172a, #050811); }
        .section { display: none; max-width: 900px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid #1f2937; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 12px; letter-spacing: 1px; }

        /* Stats Grid */
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #030712; padding: 12px; border-radius: 10px; border: 1px solid #1f2937; text-align: center; }
        .stat-label { font-size: 0.55rem; color: #64748b; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .stat-val { font-size: 0.95rem; font-weight: 800; color: #fff; }

        /* Input Styles */
        input, select { width: 100%; background: #030712; border: 1px solid #374151; color: #fff; padding: 12px; border-radius: 8px; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        button.primary { background: linear-gradient(135deg, #00d2ff, #3b82f6); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; }
        button.primary:active { transform: scale(0.98); }

        /* Calculator Specific */
        .calc-res-area { text-align: center; background: #000; padding: 20px; border-radius: 12px; border: 1px dashed var(--accent); margin: 15px 0; }
        .lot-big { font-size: 3.5rem; font-weight: 900; color: #fff; line-height: 1; }
        .copy-btn { display: inline-block; margin-top: 10px; background: #1e293b; color: var(--accent); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; }

        /* Acc List */
        .acc-row { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #1e293b; }
        .del-btn { color: var(--loss); cursor: pointer; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="border:none; text-align:center; padding:0; margin-bottom:30px;">KUAD ELITE</h2>
        <div class="nav-item active" onclick="showSec('dash')">TRADING DESK</div>
        <div class="nav-item" onclick="showSec('journal')">TRADE LOGGER</div>
        <div class="nav-item" onclick="showSec('daily')">DAILY TRACKER</div>
        <div class="nav-item" onclick="showSec('accounts')">ACCOUNTS MGMT</div>
    </div>

    <div class="main">
        <div id="dash" class="section active">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2>Account Overview</h2>
                    <select id="acc-select" onchange="switchAcc()" style="width:auto; margin:0; border:none; background:transparent; font-weight:bold; color:var(--accent);"></select>
                </div>
                <div class="grid-4">
                    <div class="stat-box"><span class="stat-label">Start</span><div id="d-st" class="stat-val">$0</div></div>
                    <div class="stat-box"><span class="stat-label">Current</span><div id="d-cur" class="stat-val">$0</div></div>
                    <div class="stat-box"><span class="stat-label">Target</span><div id="d-trg" class="stat-val">$0</div></div>
                    <div class="stat-box"><span class="stat-label">To Goal</span><div id="d-rem" class="stat-val" style="color:var(--win)">$0</div></div>
                </div>
            </div>

            <div class="card">
                <h2>Position Calculator</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <div><label class="stat-label">SL Pips</label><input type="number" id="c-sl" placeholder="15"></div>
                    <div><label class="stat-label">Risk %</label><input type="number" id="c-risk" value="1"></div>
                    <div><label class="stat-label">Account Bal</label><input type="number" id="c-bal-manual" placeholder="Auto uses active"></div>
                </div>
                <div class="calc-res-area">
                    <div class="lot-big" id="lot-res">0.00</div>
                    <div id="risk-dollars" style="color:var(--loss); font-size:0.8rem; margin-top:5px;">Risk: $0.00</div>
                    <div class="copy-btn" onclick="copyLot()">COPY LOT SIZE</div>
                </div>
                <button class="primary" onclick="runCalc()">Calculate Lot</button>
            </div>
        </div>

        <div id="journal" class="section">
            <div class="card">
                <h2>Journal Entry (Per Trade)</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <select id="j-pair"><option>XAUUSD</option><option>EURUSD</option><option>GBPUSD</option><option>BTCUSD</option></select>
                    <select id="j-session"><option>London</option><option>New York</option><option>Asia</option></select>
                </div>
                <input type="number" id="j-pnl" placeholder="Profit/Loss ($) Use - for loss">
                <button class="primary" onclick="logTrade('journal')">Log Single Trade</button>
            </div>
            <div id="j-list"></div>
        </div>

        <div id="daily" class="section">
            <div class="card">
                <h2>Daily Close Tracker (End of Day)</h2>
                <label class="stat-label">Aaj ka total result kya raha?</label>
                <input type="number" id="d-pnl" placeholder="Total Day P/L ($) e.g. 1200 or -500">
                <button class="primary" onclick="logTrade('daily')">Save Daily Result</button>
            </div>
            <div id="d-list"></div>
        </div>

        <div id="accounts" class="section">
            <div class="card">
                <h2>Account Config (4 Fields)</h2>
                <input type="text" id="a-name" placeholder="Account Name">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <div><label class="stat-label">Start Bal</label><input type="number" id="a-st" placeholder="100000"></div>
                    <div><label class="stat-label">Current Bal</label><input type="number" id="a-cur" placeholder="100000"></div>
                    <div><label class="stat-label">Target Bal</label><input type="number" id="a-trg" placeholder="110000"></div>
                </div>
                <button class="primary" onclick="newAcc()">Create Account</button>
            </div>
            <div id="acc-list-manage"></div>
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('kuad_v13_final')) || { accs: [], active: -1, logs: [], daily: [] };

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function newAcc() {
        const n = document.getElementById('a-name').value, st = parseFloat(document.getElementById('a-st').value), cur = parseFloat(document.getElementById('a-cur').value), trg = parseFloat(document.getElementById('a-trg').value);
        if(n && !isNaN(st)) {
            db.accs.push({name: n, start: st, current: cur, target: trg});
            if(db.active === -1) db.active = 0;
            save(); location.reload();
        }
    }

    function switchAcc() { db.active = document.getElementById('acc-select').selectedIndex; updateUI(); save(); }

    function runCalc() {
        const activeAcc = db.accs[db.active];
        const manualBal = parseFloat(document.getElementById('c-bal-manual').value);
        const bal = manualBal || (activeAcc ? activeAcc.current : 0);
        const sl = parseFloat(document.getElementById('c-sl').value);
        const riskPer = parseFloat(document.getElementById('c-risk').value);

        if(bal && sl && riskPer) {
            const riskAmt = bal * (riskPer / 100);
            const lot = riskAmt / (sl * 10);
            document.getElementById('lot-res').innerText = lot.toFixed(2);
            document.getElementById('risk-dollars').innerText = `Risk Amount: $${riskAmt.toFixed(2)}`;
        }
    }

    function logTrade(type) {
        if(db.active === -1) return alert("Account select karo!");
        const pnl = parseFloat(document.getElementById(type === 'journal' ? 'j-pnl' : 'd-pnl').value);
        if(isNaN(pnl)) return;

        db.accs[db.active].current += pnl; // Updates account balance
        const entry = { acc: db.accs[db.active].name, pnl, date: new Date().toLocaleDateString() };

        if(type === 'journal') {
            entry.pair = document.getElementById('j-pair').value;
            entry.session = document.getElementById('j-session').value;
            db.logs.unshift(entry);
        } else {
            db.daily.unshift(entry);
        }

        save(); updateUI(); alert("Entry Synchronized!");
    }

    function copyLot() { navigator.clipboard.writeText(document.getElementById('lot-res').innerText); alert("Lot Copied!"); }

    function updateUI() {
        const sel = document.getElementById('acc-select');
        sel.innerHTML = db.accs.map(a => `<option>${a.name}</option>`).join('');
        sel.selectedIndex = db.active;

        if(db.active !== -1) {
            const a = db.accs[db.active];
            document.getElementById('d-st').innerText = `$${a.start.toLocaleString()}`;
            document.getElementById('d-cur').innerText = `$${a.current.toLocaleString()}`;
            document.getElementById('d-trg').innerText = `$${a.target.toLocaleString()}`;
            document.getElementById('d-rem').innerText = `$${(a.target - a.current).toLocaleString()}`;
        }

        // Render Lists
        document.getElementById('acc-list-manage').innerHTML = db.accs.map((a, i) => `<div class="acc-row"><span>${a.name}</span><span class="del-btn" onclick="delAcc(${i})">DELETE</span></div>`).join('');
        document.getElementById('j-list').innerHTML = db.logs.filter(l => l.acc === db.accs[db.active]?.name).map(l => `<div class="acc-row" style="border-left:4px solid ${l.pnl >=0 ? '#10b981' : '#ef4444'}"><span>${l.pair} (${l.session})</span><span>${l.pnl >=0 ? '+' : ''}${l.pnl}$</span></div>`).join('');
        document.getElementById('d-list').innerHTML = db.daily.filter(l => l.acc === db.accs[db.active]?.name).map(l => `<div class="acc-row" style="background:#030712"><span>${l.date}</span><span style="color:${l.pnl >=0 ? '#10b981' : '#ef4444'}">${l.pnl >=0 ? '+' : ''}${l.pnl}$</span></div>`).join('');
    }

    function delAcc(i) { if(confirm("Delete?")) { db.accs.splice(i,1); db.active = db.accs.length > 0 ? 0 : -1; save(); location.reload(); } }
    function save() { localStorage.setItem('kuad_v13_final', JSON.stringify(db)); }
    updateUI();
</script>
</body>
</html>
