<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUAD ELITE | PROFESSIONAL TERMINAL</title>
    <style>
        :root { --accent: #00d2ff; --bg: #02040a; --win: #00ffaa; --loss: #ff4d4d; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: #02040a;
            color: #e2e8f0; height: 100vh; overflow: hidden;
        }

        /* Professional Trading Background */
        #auth-screen { 
            position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;
            background: linear-gradient(rgba(2, 4, 10, 0.8), rgba(2, 4, 10, 0.9)), 
                        url('https://images.unsplash.com/photo-1611974717482-5828ed33da4c?auto=format&fit=crop&q=80&w=2070');
            background-size: cover; background-position: center;
        }

        .auth-card { 
            background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(20px); 
            border: 1px solid var(--border); padding: 30px; border-radius: 28px; 
            width: 100%; max-width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Professional Logo Style */
        .brand-logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 5px; }
        .brand-logo span { color: var(--accent); text-shadow: 0 0 15px rgba(0, 210, 255, 0.5); }

        .auth-tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; margin-bottom: 25px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: #64748b; border-radius: 8px; transition: 0.3s; }
        .auth-tab.active { background: var(--accent); color: #000; }

        input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: #fff; padding: 14px; border-radius: 12px; margin-bottom: 12px; outline: none;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        .btn-main { 
            width: 100%; background: var(--accent); color: #000; border: none; padding: 16px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* OTP Input (Initially Hidden) */
        #otp-box { display: none; margin-top: 10px; }

        #app-content { display: none; height: 100vh; flex-direction: column; }
        /* Baaki App Logic v36.2 wala hi rahega */
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="brand-logo">KUAD <span>ELITE</span></div>
            <p style="font-size: 0.65rem; color: #64748b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;">Professional Trader Terminal</p>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="toggleAuth('login')">LOGIN</div>
                <div class="auth-tab" id="tab-signup" onclick="toggleAuth('signup')">SIGNUP</div>
            </div>

            <div id="login-fields">
                <input type="text" id="login-id" placeholder="Username or Email">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn-main" onclick="handleLogin()">Sign In</button>
            </div>

            <div id="signup-fields" style="display: none;">
                <input type="email" id="signup-email" placeholder="Gmail Address">
                <input type="text" id="signup-user" placeholder="Create Username">
                <input type="password" id="signup-pass" placeholder="Create Password">
                
                <div id="otp-box">
                    <p style="font-size:0.6rem; color:var(--accent); margin-bottom:8px;">Enter OTP sent to Gmail</p>
                    <input type="number" id="otp-input" placeholder="6-Digit OTP">
                </div>
                
                <button class="btn-main" id="signup-btn" onclick="requestOTP()">Send OTP</button>
            </div>
            
            <p id="auth-msg" style="color:var(--loss); font-size: 0.65rem; margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <script>
        let mode = 'login';

        function toggleAuth(m) {
            mode = m;
            document.getElementById('tab-login').classList.toggle('active', m==='login');
            document.getElementById('tab-signup').classList.toggle('active', m==='signup');
            document.getElementById('login-fields').style.display = m==='login' ? 'block' : 'none';
            document.getElementById('signup-fields').style.display = m==='signup' ? 'block' : 'none';
        }

        function requestOTP() {
            const email = document.getElementById('signup-email').value;
            if(!email.includes('@')) { alert("Enter valid Gmail!"); return; }
            
            // UI Change for OTP
            document.getElementById('otp-box').style.display = 'block';
            document.getElementById('signup-btn').innerText = "Verify & Signup";
            document.getElementById('signup-btn').onclick = finalSignup;
            
            alert("Simulated: OTP sent to " + email);
        }

        function finalSignup() {
            const otp = document.getElementById('otp-input').value;
            if(otp.length === 6) {
                alert("Account Verified Successfully!");
                toggleAuth('login');
            } else {
                alert("Invalid OTP!");
            }
        }

        function handleLogin() {
            // Aapka purana login logic yahan aayega
            alert("Connecting to Terminal...");
        }
    </script>
</body>
</html>
