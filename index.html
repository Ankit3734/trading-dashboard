<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUAD ELITE | ORGANIZED v42</title>
    <style>
        :root { --accent: #00d2ff; --bg: #02040a; --card: rgba(17, 24, 39, 0.8); --text: #e2e8f0; --win: #00ffaa; --loss: #ff4d4d; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: 0.2s; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Auth Screen Background */
        #auth-screen { 
            position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;
            background: linear-gradient(rgba(2, 4, 10, 0.8), rgba(2, 4, 10, 0.9)), url('https://images.unsplash.com/photo-1611974717482-5828ed33da4c?q=80&w=2070');
            background-size: cover; background-position: center;
        }
        .auth-card { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 30px; border-radius: 25px; width: 100%; max-width: 360px; text-align: center; }

        /* Sidebar UI */
        #app-content { display: none; height: 100vh; width: 100%; overflow: hidden; flex-direction: column; }
        .sidebar { width: 100%; background: #0a0f1a; border-bottom: 1px solid var(--border); padding: 8px; display: flex; overflow-x: auto; gap: 8px; flex-shrink: 0; }
        .nav-item { padding: 10px 18px; cursor: pointer; border-radius: 10px; color: #64748b; font-weight: 700; font-size: 0.75rem; white-space: nowrap; border: 1px solid transparent; }
        .nav-item.active { background: #1e293b; color: var(--accent); border-color: var(--accent); }
        
        .main { flex: 1; padding: 12px; overflow-y: auto; background: radial-gradient(circle at top right, #0f172a, #02040a); }
        .section { display: none; width: 100%; max-width: 800px; margin: 0 auto; }
        .section.active { display: block; }

        /* Cards & Elements */
        .card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 16px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        h2 { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 0.6rem; color: #64748b; display: block; margin-bottom: 5px; }
        .stat-val { font-size: 1.1rem; font-weight: 900; }
        
        .progress-bar-bg { background: #030712; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #00d2ff, #3b82f6); box-shadow: 0 0 15px var(--accent); width: 0%; transition: 1.2s; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .data-table td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        input, select { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; outline: none; margin-bottom: 10px; font-size: 0.9rem; }
        button.primary { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3); }

        @media (min-width: 768px) {
            #app-content { flex-direction: row; }
            .sidebar { width: 200px; height: 100vh; flex-direction: column; border-bottom: none; border-right: 1px solid var(--border); }
            .grid-stats { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="margin-bottom:15px; font-size:1.8rem;">KUAD <span style="color:var(--accent)">ELITE</span></h1>
            <input type="text" id="l-user" placeholder="Enter Username">
            <input type="password" id="l-pass" placeholder="Enter Password">
            <button class="primary" onclick="doLogin()">Unlock Dashboard</button>
        </div>
    </div>

    <div id="app-content">
        <div class="sidebar">
            <div style="padding: 20px; font-weight: 900; text-align: center; color: var(--accent); font-size: 1.1rem;">TERMINAL</div>
            <div id="nav-dash" class="nav-item active" onclick="showSec('dash')">DASHBOARD</div>
            <div id="nav-journal" class="nav-item" onclick="showSec('journal')">JOURNAL</div>
            <div id="nav-accounts" class="nav-item" onclick="showSec('accounts')">ACCOUNTS</div>
            <button onclick="logout()" style="margin-top:auto; background:none; border:none; color:var(--loss); padding:20px; font-weight:bold; cursor:pointer; text-align:left;">LOGOUT</button>
        </div>

        <div class="main">
            <div id="dash" class="section active">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <h2>Monitor</h2>
                        <select id="acc-select" onchange="switchAcc()" style="width:auto; padding:5px 12px; margin:0; font-size:0.7rem;"></select>
                    </div>
                    <div class="grid-stats">
                        <div class="stat-box"><span class="stat-label">Balance</span><div id="d-cur" class="stat-val">$0</div></div>
                        <div class="stat-box"><span class="stat-label">Win Rate</span><div id="d-wr" class="stat-val" style="color:var(--accent)">0%</div></div>
                        <div class="stat-box"><span class="stat-label">To Goal</span><div id="d-rem" class="stat-val" style="color:var(--win)">$0</div></div>
                        <div class="stat-box"><span class="stat-label">Progress</span><div id="p-text" class="stat-val">0%</div></div>
                    </div>
                    <div class="progress-bar-bg"><div id="p-bar" class="progress-bar-fill"></div></div>
                </div>
                <div class="card"><h2>Day Stats (%)</h2><table class="data-table"><tbody id="day-stats-body"></tbody></table></div>
                <div class="card"><h2>Master Matrix</h2><div style="overflow-x:auto;"><table class="data-table"><tbody id="combo-stats-body"></tbody></table></div></div>
            </div>

            <div id="journal" class="section">
                <div class="card">
                    <h2>Log New Trade</h2>
                    <select id="j-day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select>
                    <select id="j-pair"><option>XAUUSD</option><option>EURUSD</option><option>GBPUSD</option><option>BTCUSD</option></select>
                    <select id="j-session"><option>London</option><option>New York</option><option>Asia</option></select>
                    <select id="j-res"><option value="win">PROFIT (+)</option><option value="loss">LOSS (-)</option></select>
                    <input type="number" id="j-pnl" placeholder="Amount ($)" inputmode="decimal">
                    <button class="primary" onclick="logTrade()">Save to Journal</button>
                </div>
                <div id="full-history"></div>
            </div>

            <div id="accounts" class="section">
                <div class="card">
                    <h2 id="acc-form-title">Add New Account</h2>
                    <input type="text" id="a-name" placeholder="Account Name (e.g. 100k Challenge)">
                    <input type="number" id="a-st" placeholder="Starting Balance" inputmode="decimal">
                    <input type="number" id="a-trg" placeholder="Profit Target ($)" inputmode="decimal">
                    <button class="primary" id="acc-btn" onclick="handleAcc()">Create Account</button>
                </div>
                <div id="acc-list"></div>
            </div>
        </div>
    </div>

<script>
    const USERS_KEY = 'KUAD_PLATFORM_USERS';
    let currentUser = null;
    let editingIdx = null;

    function doLogin() {
        const u = document.getElementById('l-user').value.toLowerCase().trim();
        const p = document.getElementById('l-pass').value.trim();
        let users = JSON.parse(localStorage.getItem(USERS_KEY)) || {};
        if(!users[u]) users[u] = { pass: p, data: { accs: [], active: -1, logs: [] } };
        if(users[u].pass === p) {
            currentUser = u;
            sessionStorage.setItem('current_trader', u);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            updateUI();
        } else { alert("Access Denied!"); }
    }

    function getUserData() { return (JSON.parse(localStorage.getItem(USERS_KEY)))[currentUser].data; }
    function saveUserData(d) { let u = JSON.parse(localStorage.getItem(USERS_KEY)); u[currentUser].data = d; localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('nav-' + id).classList.add('active');
        updateUI();
    }

    function logTrade() {
        let db = getUserData(); if(db.active === -1) return;
        let pnl = parseFloat(document.getElementById('j-pnl').value);
        if(isNaN(pnl)) return;
        pnl = (document.getElementById('j-res').value === 'loss') ? -Math.abs(pnl) : Math.abs(pnl);
        db.accs[db.active].current += pnl;
        db.logs.unshift({ acc: db.accs[db.active].name, pnl, pair: document.getElementById('j-pair').value, session: document.getElementById('j-session').value, day: document.getElementById('j-day').value, date: new Date().toLocaleDateString() });
        saveUserData(db); updateUI();
        document.getElementById('j-pnl').value = '';
    }

    function updateUI() {
        if(!currentUser) return;
        let db = getUserData();
        const sel = document.getElementById('acc-select');
        sel.innerHTML = db.accs.map(a => `<option>${a.name}</option>`).join('');
        sel.selectedIndex = db.active;

        if(db.active !== -1) {
            const a = db.accs[db.active];
            const accLogs = db.logs.filter(l => l.acc === a.name);
            document.getElementById('d-cur').innerText = `$${a.current.toFixed(0)}`;
            const rem = a.target - a.current;
            document.getElementById('d-rem').innerText = rem <= 0 ? "PASSED" : `$${rem.toFixed(0)}`;
            const wins = accLogs.filter(l => l.pnl > 0).length;
            document.getElementById('d-wr').innerText = accLogs.length > 0 ? Math.round((wins/accLogs.length)*100)+'%' : '0%';
            let prog = Math.max(0, Math.min(100, ((a.current - a.start)/(a.target - a.start))*100));
            document.getElementById('p-bar').style.width = prog+'%';
            document.getElementById('p-text').innerText = Math.round(prog)+'%';

            document.getElementById('day-stats-body').innerHTML = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'].map(d => {
                const logs = accLogs.filter(l => l.day === d);
                const pnl = logs.reduce((s, l) => s + l.pnl, 0);
                return `<tr><td>${d}</td><td style="color:var(--accent)">${logs.length > 0 ? Math.round((logs.filter(l => l.pnl > 0).length/logs.length)*100) : 0}%</td><td style="color:${pnl>=0?'var(--win)':'var(--loss)'}">${pnl.toFixed(0)}$</td></tr>`;
            }).join('');

            const combos = {};
            accLogs.forEach(l => {
                const k = `${l.session} + ${l.pair}`;
                if(!combos[k]) combos[k] = {t:0, w:0, pnl:0};
                combos[k].t++; if(l.pnl > 0) combos[k].w++; combos[k].pnl += l.pnl;
            });
            document.getElementById('combo-stats-body').innerHTML = Object.keys(combos).map(k => `<tr><td><b>${k}</b></td><td>${Math.round((combos[k].w/combos[k].t)*100)}%</td><td style="color:${combos[k].pnl>=0?'var(--win)':'var(--loss)'}">${combos[k].pnl.toFixed(0)}$</td></tr>`).join('');
            document.getElementById('full-history').innerHTML = accLogs.map(l => `<div class="card" style="display:flex; justify-content:space-between; font-size:0.75rem;"><span><b>${l.pair}</b> | ${l.day}</span><b style="color:${l.pnl>=0?'var(--win)':'var(--loss)'}">${l.pnl}$</b></div>`).join('');
        }
        document.getElementById('acc-list').innerHTML = db.accs.map((a,i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${a.name}</b><br><small>$${a.current.toFixed(0)} / $${a.target}</small></div>
                <div>
                    <button onclick="editAcc(${i})" style="background:var(--accent); color:black; padding:5px 10px; border-radius:6px; font-size:0.6rem; font-weight:bold; cursor:pointer;">EDIT</button>
                    <button onclick="delAcc(${i})" style="background:var(--loss); color:white; padding:5px 10px; border-radius:6px; font-size:0.6rem; font-weight:bold; cursor:pointer; margin-left:5px;">DEL</button>
                </div>
            </div>`).join('');
    }

    function handleAcc() {
        let db = getUserData();
        const n = document.getElementById('a-name').value, st = parseFloat(document.getElementById('a-st').value), trg = parseFloat(document.getElementById('a-trg').value);
        if(!n || isNaN(st)) return;
        if(editingIdx !== null) {
            db.accs[editingIdx] = {name:n, start:st, current:st, target:trg};
            editingIdx = null;
            document.getElementById('acc-form-title').innerText = "Add New Account";
            document.getElementById('acc-btn').innerText = "Create Account";
        } else {
            db.accs.push({name:n, start:st, current:st, target:trg});
            if(db.active === -1) db.active = db.accs.length - 1;
        }
        saveUserData(db); updateUI();
        document.getElementById('a-name').value = ''; document.getElementById('a-st').value = ''; document.getElementById('a-trg').value = '';
    }

    function editAcc(i) {
        let db = getUserData(); const a = db.accs[i];
        document.getElementById('a-name').value = a.name; document.getElementById('a-st').value = a.start; document.getElementById('a-trg').value = a.target;
        editingIdx = i;
        document.getElementById('acc-form-title').innerText = "Edit Account: " + a.name;
        document.getElementById('acc-btn').innerText = "Update Account";
        window.scrollTo(0,0);
    }

    function delAcc(i) {
        if(confirm("Delete this account permanently?")) {
            let db = getUserData(); db.accs.splice(i, 1);
            if(db.active >= i) db.active = Math.max(-1, db.active - 1);
            saveUserData(db); updateUI();
        }
    }

    function switchAcc() { let db = getUserData(); db.active = document.getElementById('acc-select').selectedIndex; saveUserData(db); updateUI(); }
    function logout() { sessionStorage.removeItem('current_trader'); location.reload(); }
    window.onload = () => { if(sessionStorage.getItem('current_trader')) { currentUser = sessionStorage.getItem('current_trader'); document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'flex'; updateUI(); } };
</script>
</body>
</html>
