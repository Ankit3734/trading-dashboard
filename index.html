<!DOCTYPE html>
<html>
<head>
  <title>Trading Journal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Trading Journal</h1>

<!-- Account Section -->
<div class="box">
  <input type="text" id="accountName" placeholder="Account Name">
  <button onclick="addAccount()">Add Account</button>

  <select id="accountSelect" onchange="switchAccount(this.value)"></select>
</div>

<!-- Trade Form -->
<div class="box">
  <h3>Add Trade</h3>

  <input id="symbol" placeholder="Symbol"><br>
  <input id="entry" placeholder="Entry Price"><br>
  <input id="exit" placeholder="Exit Price"><br>
  <input id="qty" placeholder="Quantity"><br>

  <select id="direction">
    <option value="long">Long</option>
    <option value="short">Short</option>
  </select><br>

  <input id="fees" placeholder="Fees"><br>

  <button onclick="saveTrade()">Save Trade</button>
</div>

<!-- History -->
<div class="box">
  <h3>History</h3>
  <div id="history"></div>
</div>

<script src="script.js"></script>
</body>
</html>
