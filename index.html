<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KUAD ELITE | MULTI-ACCOUNT OS</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050811; --card: #111827; --text: #e2e8f0; --win: #10b981; --loss: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #0a0f1a; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 15px; cursor: pointer; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; color: #64748b; font-weight: 600; font-size: 0.85rem; }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: var(--accent); }
        
        .main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f172a, #050811); }
        .section { display: none; max-width: 900px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid #1f2937; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 20px; }
        h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; margin-bottom: 25px; border-left: 4px solid var(--accent); padding-left: 15px; }
        
        .acc-display { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 15px 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid var(--accent); }
        .balance-text { font-size: 1.8rem; font-weight: 800; color: #fff; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; background: #030712; border: 1px solid #374151; color: #fff; padding: 12px; border-radius: 8px; outline: none; margin-bottom: 10px; }
        button.primary { background: linear-gradient(135deg, #00d2ff, #3b82f6); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
        
        .history-card { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #334155; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="border:none; text-align:center; padding:0; margin-bottom:40px;">KUAD ELITE</h2>
        <div class="nav-item active" onclick="showSec('dash')">DASHBOARD</div>
        <div class="nav-item" onclick="showSec('manage-acc')">MANAGE ACCOUNTS</div>
        <div class="nav-item" onclick="showSec('journal')">LOG TRADE</div>
        <div class="nav-item" onclick="showSec('history')">HISTORY</div>
    </div>

    <div class="main">
        <div class="acc-display">
            <div>
                <label style="font-size:0.7rem; color:var(--accent)">ACTIVE ACCOUNT</label>
                <select id="acc-switcher" onchange="switchAccount()" style="margin:0; background:transparent; border:none; font-weight:bold; font-size:1.2rem; cursor:pointer;"></select>
            </div>
            <div style="text-align:right">
                <label style="font-size:0.7rem; color:var(--accent)">CURRENT BALANCE</label>
                <div id="active-bal" class="balance-text">$0.00</div>
            </div>
        </div>

        <div id="dash" class="section active">
            <div class="grid">
                <div class="card">
                    <h2>Target Progress</h2>
                    <div id="target-info" style="font-size: 1.2rem; font-weight: bold;">Set an account to see target</div>
                    <div id="target-diff" style="color: var(--accent); margin-top:10px;">$0.00 to goal</div>
                </div>
                <div class="card">
                    <h2>Lot Calc</h2>
                    <input type="number" id="sl-pips" placeholder="Stop Loss (Pips)">
                    <input type="number" id="risk-per" placeholder="Risk %" value="1">
                    <div id="lot-output" style="font-size: 2rem; font-weight: 900; color: var(--accent); margin-top:10px;">0.00</div>
                    <button class="primary" onclick="quickCalc()">Calculate</button>
                </div>
            </div>
        </div>

        <div id="manage-acc" class="section">
            <div class="card">
                <h2>Add New Account</h2>
                <input type="text" id="new-acc-name" placeholder="e.g. 100K Funded">
                <input type="number" id="new-acc-bal" placeholder="Starting Balance ($)">
                <input type="number" id="new-acc-target" placeholder="Target Profit ($)">
                <button class="primary" onclick="addAccount()">Create Account</button>
            </div>
        </div>

        <div id="journal" class="section">
            <div class="card">
                <h2>New Trade Entry</h2>
                <div class="grid">
                    <select id="p-pair">
                        <option>XAUUSD</option><option>EURUSD</option><option>GBPUSD</option><option>BTCUSD</option>
                    </select>
                    <select id="p-out">
                        <option value="WIN">WIN</option><option value="LOSS">LOSS</option><option value="BE">BREAK-EVEN</option>
                    </select>
                </div>
                <input type="number" id="p-profit" placeholder="Profit/Loss Amount ($) e.g. 500 or -200">
                <button class="primary" onclick="saveTrade()">Log & Update Balance</button>
            </div>
        </div>

        <div id="history" class="section">
            <div id="trade-history-list"></div>
        </div>
    </div>

<script>
    let state = JSON.parse(localStorage.getItem('kuad_v7_state')) || { accounts: [], activeIdx: -1, trades: [] };

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function addAccount() {
        const name = document.getElementById('new-acc-name').value;
        const bal = parseFloat(document.getElementById('new-acc-bal').value);
        const target = parseFloat(document.getElementById('new-acc-target').value);
        if(!name || !bal) return alert("Details bharo bhai!");

        state.accounts.push({ name, balance: bal, startBal: bal, target: target });
        if(state.activeIdx === -1) state.activeIdx = 0;
        saveState();
        location.reload();
    }

    function switchAccount() {
        state.activeIdx = document.getElementById('acc-switcher').selectedIndex;
        saveState();
        updateUI();
    }

    function saveTrade() {
        const amt = parseFloat(document.getElementById('p-profit').value);
        const acc = state.accounts[state.activeIdx];
        if(!acc || isNaN(amt)) return alert("Data check karo!");

        acc.balance += amt;
        state.trades.unshift({
            accName: acc.name,
            pair: document.getElementById('p-pair').value,
            outcome: document.getElementById('p-out').value,
            amount: amt,
            date: new Date().toLocaleDateString()
        });

        saveState();
        updateUI();
        alert("Account Updated!");
    }

    function quickCalc() {
        const acc = state.accounts[state.activeIdx];
        const sl = document.getElementById('sl-pips').value;
        const risk = document.getElementById('risk-per').value;
        if(acc && sl) {
            const lot = (acc.balance * (risk/100)) / (sl * 10);
            document.getElementById('lot-output').innerText = lot.toFixed(2);
        }
    }

    function updateUI() {
        const switcher = document.getElementById('acc-switcher');
        switcher.innerHTML = state.accounts.map(a => `<option>${a.name}</option>`).join('');
        switcher.selectedIndex = state.activeIdx;

        if(state.activeIdx !== -1) {
            const acc = state.accounts[state.activeIdx];
            document.getElementById('active-bal').innerText = `$${acc.balance.toLocaleString()}`;
            const diff = (acc.startBal + acc.target) - acc.balance;
            document.getElementById('target-info').innerText = `Goal: $${(acc.startBal + acc.target).toLocaleString()}`;
            document.getElementById('target-diff').innerText = diff > 0 ? `$${diff.toLocaleString()} to go` : "Target Hit! 🚀";
        }

        document.getElementById('trade-history-list').innerHTML = state.trades
            .filter(t => t.accName === state.accounts[state.activeIdx]?.name)
            .map(t => `<div class="history-card"><b>${t.pair}</b>: ${t.amount > 0 ? '+' : ''}$${t.amount} (${t.date})</div>`).join('');
    }

    function saveState() { localStorage.setItem('kuad_v7_state', JSON.stringify(state)); }
    updateUI();
</script>
</body>
</html>
