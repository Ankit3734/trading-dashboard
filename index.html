<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KUAD GHOST | TERMINAL OS</title>
    <style>
        :root { --accent: #00d2ff; --bg: #050811; --card: #111827; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 220px; background: #0a0f1a; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; color: #64748b; font-size: 0.8rem; font-weight: bold; }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: var(--accent); }

        /* Main Area */
        .main { flex: 1; padding: 30px; display: flex; flex-direction: column; position: relative; }
        .section { display: none; max-width: 600px; width: 100%; margin: 0 auto; }
        .section.active { display: block; }

        /* Calculation Card */
        .card { background: var(--card); border: 1px solid #1f2937; padding: 25px; border-radius: 15px; text-align: center; }
        .lot-box { font-size: 4rem; font-weight: 900; color: #fff; margin: 10px 0; letter-spacing: -2px; }
        
        /* Copy Button */
        .copy-btn { background: #1e293b; color: var(--accent); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; transition: 0.3s; margin-bottom: 20px; display: inline-block; }
        .copy-btn:hover { background: var(--accent); color: #000; }

        /* Live Terminal Box */
        .terminal { background: #000; border: 1px solid #334155; padding: 15px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 0.75rem; color: #00ff88; height: 150px; overflow-y: auto; margin-top: auto; }
        .term-line::before { content: ">> "; color: var(--accent); }

        input { width: 100%; background: #030712; border: 1px solid #374151; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button.execute { width: 100%; background: linear-gradient(135deg, #00d2ff, #3b82f6); color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--accent); text-align:center; font-size:1rem;">KUAD GHOST</h2>
        <div class="nav-item active" onclick="showSec('calc')">CALCULATOR</div>
        <div class="nav-item" onclick="showSec('acc')">ACCOUNTS</div>
        <div class="nav-item" onclick="showSec('log')">LOG TRADE</div>
    </div>

    <div class="main">
        <div id="calc" class="section active">
            <div class="card">
                <h3 style="font-size:0.7rem; color:var(--accent); letter-spacing:2px;">LOT SIZE CALCULATOR</h3>
                <div id="lot-display" class="lot-box">0.00</div>
                <div class="copy-btn" onclick="copyToClipboard()">CLICK TO COPY LOT</div>
                
                <input type="number" id="sl-input" placeholder="Stop Loss Pips">
                <input type="number" id="risk-input" value="1" placeholder="Risk %">
                <button class="execute" onclick="calculate()">RUN EXECUTION</button>
            </div>
        </div>

        <div id="acc" class="section">
            <div class="card">
                <h3 style="font-size:0.7rem; color:var(--accent);">MANAGE ACCOUNT</h3>
                <input type="text" id="acc-name" placeholder="Account Name (e.g. 100K Funded)">
                <input type="number" id="acc-bal" placeholder="Current Balance ($)">
                <button class="execute" onclick="updateAccount()">UPDATE ACCOUNT</button>
            </div>
        </div>

        <div class="terminal" id="terminal">
            <div class="term-line">System Booting...</div>
            <div class="term-line">Connection Secure. Ready for Trading.</div>
        </div>
    </div>

    <script>
        let currentBalance = localStorage.getItem('kb_bal') || 100000;
        let accName = localStorage.getItem('kb_name') || "Default Acc";

        function logTerm(msg) {
            const term = document.getElementById('terminal');
            term.innerHTML += `<div class="term-line">${msg}</div>`;
            term.scrollTop = term.scrollHeight;
        }

        function showSec(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            logTerm(`Mapsd to ${id.toUpperCase()}`);
        }

        function calculate() {
            let sl = document.getElementById('sl-input').value;
            let risk = document.getElementById('risk-input').value;
            if(!sl) return logTerm("Error: SL Pips required!");
            
            let lotSize = (currentBalance * (risk/100)) / (sl * 10);
            document.getElementById('lot-display').innerText = lotSize.toFixed(2);
            logTerm(`Calculation Success: ${lotSize.toFixed(2)} Lots based on $${currentBalance}`);
        }

        function copyToClipboard() {
            let lot = document.getElementById('lot-display').innerText;
            navigator.clipboard.writeText(lot).then(() => {
                logTerm(`Copied ${lot} to clipboard!`);
                alert("Lot Copied: " + lot);
            });
        }

        function updateAccount() {
            let n = document.getElementById('acc-name').value;
            let b = document.getElementById('acc-bal').value;
            if(n) { accName = n; localStorage.setItem('kb_name', n); }
            if(b) { currentBalance = b; localStorage.setItem('kb_bal', b); }
            logTerm(`Account Updated: ${accName} | Balance: $${currentBalance}`);
        }
    </script>
</body>
</html>
